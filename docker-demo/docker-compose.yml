name: netty-spring-cluster-demo

services:
  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
    networks: [demonet]

  node-a:
    build: &node-build
      context: ..
      dockerfile: docker-demo/Dockerfile
    image: netty-spring-cluster-demo:latest
    environment:
      NODE_ID: node-a
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/netty/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 25s
    networks: [demonet]

  node-b:
    build: *node-build
    image: netty-spring-cluster-demo:latest
    environment:
      NODE_ID: node-b
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/netty/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 25s
    networks: [demonet]

  lb:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      node-a:
        condition: service_healthy
      node-b:
        condition: service_healthy
    networks: [demonet]

networks:
  demonet:
    driver: bridge
