version: "3.8"

services:
  # ===== Netty-Spring Demo Server =====
  # Simulates a 2C4G production server
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: netty-spring-server
    cpus: 2.0
    mem_limit: 4g
    mem_reservation: 2g
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.tcp_max_syn_backlog=65535
      - net.ipv4.ip_local_port_range=1024 65535
    ports:
      - "9080:8080"
    networks:
      - stress-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ===== Stress Test Client =====
  # No CPU/memory limits — let the client use full host resources
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: netty-spring-client
    depends_on:
      server:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - stress-net
    # Override command via: docker compose run client node ws-chat-test.js --host=server ...
    # Default runs connection test
    command: ["ws-connection-test.js", "--host=server", "--port=8080", "--max=50000", "--batch=200", "--delay=50", "--keepalive=30"]

networks:
  stress-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1500
