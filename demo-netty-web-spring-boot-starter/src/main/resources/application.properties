server.netty.port=8080
server.netty.http.gzip.enable=true
server.netty.management.enable=true

# ----------------------------------------------------------------------------
# Spring Boot Actuator note:
#   The demo includes spring-boot-starter-actuator so micrometer-core is on the
#   classpath and Netty meter binders auto-register. Actuator HTTP endpoints
#   (/actuator/*) however require a servlet container (spring-boot-starter-web
#   / tomcat), which the demo intentionally does NOT include — the framework's
#   whole point is to be Netty-only. To observe runtime metrics without a
#   servlet stack:
#     GET /netty/status   (JSON snapshot, same data Micrometer scrapes)
#     GET /netty/health   (UP/DOWN)
#   Re-enable the lines below ONLY if you also add spring-boot-starter-web to
#   the demo pom; then /actuator/metrics will be served on port 8081.
# management.endpoints.web.exposure.include=health,metrics,prometheus
# management.server.port=8081
# ----------------------------------------------------------------------------
# WebSocket application crypto demo is available through the crypto-demo Spring profile.
# Run with --spring.profiles.active=crypto-demo, then open /ws/crypto-demo.
# Handshake auth demo: --spring.profiles.active=auth-demo, connect with ?token=demo-token-2026.
#logging.level.com.github.berrywang1996.netty=debug
logging.level.root=info
