server.netty.port=8080
server.netty.http.gzip.enable=true
server.netty.management.enable=true
# Expose Actuator metrics endpoint over the Spring Boot embedded server (default 8081).
# Netty WebSocket/HTTP metrics are auto-registered when micrometer-core is on the classpath.
management.endpoints.web.exposure.include=health,metrics,prometheus
management.server.port=8081
# WebSocket application crypto demo is available through the crypto-demo Spring profile.
# Run with --spring.profiles.active=crypto-demo, then open /ws/crypto-demo.
# Handshake auth demo: --spring.profiles.active=auth-demo, connect with ?token=demo-token-2026.
#logging.level.com.github.berrywang1996.netty=debug
logging.level.root=info
