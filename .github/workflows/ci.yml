name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 1"

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  MAVEN_ARGS: "-B -ntp"

jobs:
  test:
    name: Maven Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run tests
        run: bash ./mvnw $MAVEN_ARGS test

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Generate CycloneDX SBOM
        run: bash ./mvnw $MAVEN_ARGS -Psbom -DskipTests org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: netty-spring-sbom
          path: |
            target/netty-spring-sbom.json
            target/netty-spring-sbom.xml
          if-no-files-found: error

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v')
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ hashFiles('pom.xml', 'dependency-check-suppressions.xml') }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: Require NVD API key
        if: env.NVD_API_KEY == ''
        run: |
          echo "::error::NVD_API_KEY secret is required for the release dependency scan gate."
          exit 1

      - name: Run Dependency-Check
        run: bash ./mvnw $MAVEN_ARGS -Pdependency-scan org.owasp:dependency-check-maven:12.2.1:aggregate

      - name: Upload Dependency-Check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check/**
          if-no-files-found: warn
